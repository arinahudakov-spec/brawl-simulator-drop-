<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars HUD Skeleton</title>
    <style>
        /* Подключаем фирменный округлый шрифт */
        @import url('https://fonts.googleapis.com/css2?family=Lilita+One&display=swap');

        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Lilita One', 'Impact', sans-serif;
            background: #111;
        }

        /* Главный экран игры (фиксированное соотношение или на весь экран) */
        .game-screen {
            position: relative;
            width: 100vw;
            height: 100vh;
            /* Зеленый текстурированный фон как на скриншоте 6 */
            background: radial-gradient(circle at 50% 40%, #52b141 0%, #1e5a14 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ---------------- [HUD: ВЕРХНЯЯ ПАНЕЛЬ] ---------------- */
        
        /* Левый верхний угол: Профиль, кубки, ранг */
        .hud-top-left {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        /* Правый верхний угол: Капсула ресурсов (Очки силы, Монеты, Гемы) + Меню */
        .hud-top-right {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }

        /* ---------------- [HUD: БОКОВЫЕ ПАНЕЛИ] ---------------- */

        /* Левый сайдбар: Магазин, Бойцы */
        .hud-left-sidebar {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
        }

        /* Правый сайдбар: Новости, Друзья, Клуб */
        .hud-right-sidebar {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
        }

        /* ---------------- [HUD: НИЖНЯЯ ПАНЕЛЬ] ---------------- */

        .hud-bottom-bar {
            position: absolute;
            bottom: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 10;
        }

        /* Группа слева: Brawl Pass + Квесты */
        .bottom-left-group {
            display: flex;
            align-items: flex-end;
            gap: 15px;
        }

        /* Группа справа: Выбор режима + Кнопка Играть */
        .bottom-right-group {
            display: flex;
            align-items: flex-end;
            gap: 15px;
            width: 50%; /* Занимает правую половину низа */
            justify-content: flex-end;
        }


        /* ---------------- [ЦЕНТР: ПЕРСОНАЖ] ---------------- */

        .center-stage {
            position: absolute;
            bottom: 20%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
        }

        /* Тень/подставка под ногами бравлера */
        .character-shadow {
            width: 180px;
            height: 35px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50%;
            margin-top: -20px;
            filter: blur(2px);
        }

        /* Временный макет самого персонажа */
        .brawler-placeholder {
            font-size: 120px;
            animation: idle-bounce 2s ease-in-out infinite alternate;
        }

        @keyframes idle-bounce {
            0% { transform: translateY(0) scaleX(1); }
            100% { transform: translateY(-8px) scaleX(1.02); }
        }


        /* ----------- [ВРЕМЕННЫЕ СТИЛИ ДЛЯ НАГЛЯДНОСТИ ТЕСТА] ----------- */
        /* Потом мы заменим эти скучные коробки на сочные 3D кнопки */
        
        .box-placeholder {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #fff;
            border-radius: 8px;
            padding: 10px 15px;
            color: #fff;
            font-size: 14px;
            text-transform: uppercase;
            text-align: center;
            min-width: 60px;
        }
        
        .large-btn-placeholder {
            background: #ffcc00;
            color: #000;
            padding: 20px 40px;
            font-size: 24px;
            border-radius: 12px;
            border: 3px solid #000;
        }
    </style>
</head>
<body>

    <div class="game-screen">

        <!-- ВЕРХ ЛЕВО -->
        <div class="hud-top-left">
            <div class="box-placeholder" style="background: #3b225c;">Профиль</div>
            <div class="box-placeholder" style="background: #e67e22;">58426 🏆</div>
        </div>

        <!-- ВЕРХ ПРАВО -->
        <div class="hud-top-right">
            <div class="box-placeholder" style="background: #e91e63;">7827 🧪</div>
            <div class="box-placeholder" style="background: #f1c40f; color: #000;">10797 🪙</div>
            <div class="box-placeholder" style="background: #2ecc71;">454 💎</div>
            <div class="box-placeholder" style="background: #333;">☰</div>
        </div>

        <!-- БОК ЛЕВО -->
        <div class="hud-left-sidebar">
            <div class="box-placeholder" style="background: #9b59b6;">Магазин</div>
            <div class="box-placeholder" style="background: #2980b9;">Бойцы</div>
        </div>

        <!-- ЦЕНТР (БОЕЦ) -->
        <div class="center-stage">
            <!-- Сюда потом встанет картинка Грома, Помидора или Шелли -->
            <div class="brawler-placeholder">🤖</div>
            <div class="character-shadow"></div>
        </div>

        <!-- БОК ПРАВО -->
        <div class="hud-right-sidebar">
            <div class="box-placeholder">Новости</div>
            <div class="box-placeholder">Друзья</div>
            <div class="box-placeholder">Клуб</div>
        </div>

        <!-- НИЗ ИГРЫ -->
        <div class="hud-bottom-bar">
            <!-- Бравл пасс и квесты -->
            <div class="bottom-left-group">
                <div class="box-placeholder" style="background: #f39c12; height: 70px; display:flex; align-items:center;">Brawl Pass</div>
                <div class="box-placeholder" style="background: #1abc9c;">Квесты</div>
            </div>
            
            <!-- Выбор режима и кнопка Играть -->
            <div class="bottom-right-group">
                <div class="box-placeholder" style="background: #d35400; flex-grow: 1;">Нокаут 5 на 5</div>
                <div class="large-btn-placeholder">ИГРАТЬ</div>
            </div>
        </div>

    </div>

</body>
</html>
