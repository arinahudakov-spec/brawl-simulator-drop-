<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars Modern Simulator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lilita+One&display=swap');

        * { box-sizing: border-box; font-family: 'Lilita One', sans-serif; -webkit-user-select: none; user-select: none; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #050a12;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        .game-wrapper {
            position: relative;
            width: 100vw; height: 100vh;
            max-width: 177.78vh; max-height: 56.25vw;
            min-height: 300px; /* Фикс для предотвращения черного экрана */
            background: radial-gradient(circle at 50% 50%, #46aa34 0%, #13420c 100%);
            overflow: hidden; box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .bg-pattern {
            position: absolute; width: 100%; height: 100%;
            opacity: 0.06;
            background-image: url('https://wsrv.nl/?url=cdn.brawlify.com/gamemode/Showdown.png');
            background-size: 80px; pointer-events: none;
        }

        /* HUD STYLES */
        .hud-profile { position: absolute; top: 12px; left: 15px; display: flex; gap: 8px; z-index: 10; align-items: center; }
        .avatar-box { width: 42px; height: 42px; background: #2a1b4e; border: 3px solid #000; border-radius: 8px; display: flex; align-items: center; justify-content: center; transform: skewX(-10deg); box-shadow: 0 3px 0 rgba(0,0,0,0.3); }
        .avatar-img { width: 90%; height: 90%; object-fit: contain; transform: skewX(10deg); }
        .profile-text { display: flex; flex-direction: column; gap: 1px; }
        .username { font-size: 14px; color: #fff; text-shadow: 2px 2px 0 #000; letter-spacing: 0.5px; }
        .trophies-badge { background: linear-gradient(180deg, #ff9800 0%, #e65100 100%); border: 2px solid #000; border-radius: 6px; padding: 1px 8px; font-size: 11px; color: #fff; text-shadow: 1.5px 1.5px 0 #000; transform: skewX(-10deg); display: flex; align-items: center; gap: 3px; }

        .hud-resources { position: absolute; top: 12px; right: 15px; display: flex; align-items: center; background: rgba(0, 0, 0, 0.65); border: 2.5px solid #000; border-radius: 20px; padding: 3px 12px; gap: 16px; z-index: 10; }
        .res-item { display: flex; align-items: center; gap: 5px; font-size: 14px; text-shadow: 2px 2px 0 #000; }
        .res-pp { color: #ff52ba; } .res-coins { color: #ffce20; } .res-gems { color: #4eff7c; }
        .btn-burger { background: #2e374d; border: 2px solid #000; border-radius: 5px; color: #fff; font-size: 12px; padding: 2px 6px; cursor: pointer; }

        .sidebar-left { position: absolute; left: 15px; top: 24%; display: flex; flex-direction: column; gap: 8px; z-index: 10; }
        .sidebar-right { position: absolute; right: 15px; top: 32%; display: flex; flex-direction: column; gap: 8px; z-index: 10; }
        
        .side-btn { width: 65px; height: 44px; border: 2.5px solid #000; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transform: skewX(-10deg); box-shadow: 0 4px 0 #1a237e; transition: transform 0.05s; }
        .side-btn:active { transform: skewX(-10deg) translateY(3px); box-shadow: none; }
        .side-btn span { transform: skewX(10deg); font-size: 9px; color: #fff; text-transform: uppercase; text-shadow: 1.5px 1.5px 0 #000; text-align: center; line-height: 10px; }
        
        .btn-shop { background: linear-gradient(180deg, #ffeb3b 0%, #ff9800 100%); box-shadow: 0 4px 0 #c65100; }
        .btn-ad { background: linear-gradient(180deg, #e040fb 0%, #6a1b9a 100%); box-shadow: 0 4px 0 #4a148c; }
        .btn-brawlers { background: linear-gradient(180deg, #4fc3f7 0%, #0288d1 100%); box-shadow: 0 4px 0 #01579b; }
        .btn-blue { background: linear-gradient(180deg, #7986cb 0%, #3f51b5 100%); box-shadow: 0 4px 0 #1a237e; }

        .center-stage { position: absolute; bottom: 20%; left: 24%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; z-index: 2; }
        .character-podium { width: 160px; height: 28px; background: radial-gradient(rgba(0, 0, 0, 0.65) 0%, transparent 75%); border-radius: 50%; margin-top: -25px; }
        .brawler-img-main { height: 180px; object-fit: contain; animation: idle-swim 2s ease-in-out infinite alternate; }
        .brawler-title-tag { background: #7b1fa2; border: 2px solid #000; border-radius: 12px; padding: 2px 12px; font-size: 11px; text-shadow: 1px 1px 0 #000; margin-bottom: 5px; }

        @keyframes idle-swim { 0% { transform: translateY(0) scaleX(1); } 100% { transform: translateY(-6px) scaleX(1.03); } }

        .drop-cards-container { position: absolute; top: 45%; left: 64%; transform: translate(-50%, -50%); display: flex; gap: 20px; z-index: 5; }
        .drop-card { width: 155px; height: 195px; background: linear-gradient(180deg, #00c6ff 0%, #0072ff 100%); border: 3.5px solid #000; border-radius: 14px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; overflow: hidden; cursor: pointer; box-shadow: 0 8px 0 #0044aa; }
        .drop-card.chaos { background: linear-gradient(180deg, #ff4b1f 0%, #ff1f4b 100%); box-shadow: 0 8px 0 #990011; }
        .drop-card-title { width: 100%; background: rgba(0,0,0,0.3); text-align: center; padding: 6px 0; font-size: 14px; color: #fff; text-transform: uppercase; border-bottom: 3.5px solid #000; }
        .drop-card-img { font-size: 55px; margin-top: 5px; }
        .drop-card-price { width: 100%; background: #191f2e; border-top: 3.5px solid #000; text-align: center; padding: 6px 0; font-size: 14px; color: #ffce20; }

        #brawlers-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a365d 0%, #0a192f 100%); z-index: 40; display: none; flex-direction: column; }
        #brawlers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; padding: 20px; max-height: 80vh; overflow-y: auto; }
        .rare { border: 3px solid #54f03a; } .epic { border: 3px solid #b125e1; } .mythic { border: 3px solid #ff3333; } .legendary { border: 3px solid #ffcc00; }
        .locked { opacity: 0.4; filter: grayscale(50%); }
    </style>
</head>
<body>

    <div class="game-wrapper" id="game-container">
        <div class="bg-pattern"></div>

        <div class="hud-profile">
            <div class="avatar-box"><img src="https://wsrv.nl/?url=cdn.brawlify.com/brawler/Shelly.png" class="avatar-img"></div>
            <div class="profile-text">
                <div class="username">АРИНА</div>
                <div class="trophies-badge">🏆 58426</div>
            </div>
        </div>

        <div class="hud-resources">
            <div class="res-item res-pp">🧬 <span id="pp-val">0</span></div>
            <div class="res-item res-coins">🪙 <span id="coins-val">0</span></div>
            <div class="res-item res-gems">💎 <span id="gems-val">0</span></div>
            <button class="btn-burger" onclick="resetProgress()">🔄</button>
        </div>

        <div class="sidebar-left">
            <div class="side-btn btn-shop" onclick="buyDropCard('starr', 10)"><span>Купить<br>Drop (10💎)</span></div>
            <div class="side-btn btn-ad" onclick="watchAdTest()"><span>Смотреть<br>Рекламу</span></div>
            <div class="side-btn btn-brawlers" onclick="openBrawlersScreen()"><span>Бойцы</span></div>
        </div>

        <div class="center-stage">
            <div class="brawler-title-tag">ПОМИДОР 👑</div>
            <img src="https://wsrv.nl/?url=cdn.brawlify.com/brawler/Grom.png" class="brawler-img-main">
            <div class="character-podium"></div>
        </div>

        <div class="drop-cards-container">
            <div class="drop-card" onclick="buyDropCard('starr', 10)">
                <div class="drop-card-title">СТАР ДРОП</div>
                <div class="drop-card-img">⭐</div>
                <div class="drop-card-price">10 💎</div>
            </div>
            <div class="drop-card chaos" onclick="buyDropCard('chaos', 30)">
                <div class="drop-card-title">ХАОС ДРОП</div>
                <div class="drop-card-img">🌀</div>
                <div class="drop-card-price">30 💎</div>
            </div>
        </div>

        <div class="sidebar-right">
            <div class="side-btn btn-blue"><span>Новости</span></div>
            <div class="side-btn btn-blue"><span>Друзья</span></div>
        </div>

        <div class="hud-bottom">
            <div class="btn-brawlpass"><span>BRAWL PASS</span></div>
            <div class="battle-group">
                <div class="mode-selector"><div class="mode-title">РЕКЛАМНЫЙ ФАРМ</div></div>
                <button class="btn-play-main" onclick="playButtonAction()"><span>ИГРАТЬ</span></button>
            </div>
        </div>

        <div class="starr-drop-overlay" id="starr-overlay">
            <div class="starr-sphere" id="starr-sphere-node" onclick="handleDropTap()">⭐</div>
            <div class="starr-title" id="starr-title-text">РЕДКИЙ!</div>
            <div class="starr-taps" id="starr-taps-text">Тапов осталось: 4</div>
        </div>

        <div class="reward-screen" id="reward-screen-node">
            <div class="reward-content">
                <div class="reward-icon-box" id="reward-box-border"><img id="reward-img"></div>
                <div class="reward-title" id="reward-title-text">Награда</div>
                <button class="btn-play-main" onclick="closeRewardScreen()">ЗАБРАТЬ</button>
            </div>
        </div>

        <div id="brawlers-screen">
            <div style="display: flex; align-items: center; padding: 15px; gap: 20px;">
                <button id="close-brawlers-btn" onclick="closeBrawlersScreen()" style="background: #2e374d; border: 2.5px solid #000; color: #fff; font-size: 18px; padding: 5px 12px; cursor: pointer; border-radius: 8px;">⬅</button>
                <div id="brawlers-counter" style="font-size: 20px; color: #fff;">0 из 104 БОЙЦОВ</div>
            </div>
            <div id="brawlers-grid"></div>
        </div>

    </div>

                activeDropType = type;
                currentTier = (type === 'chaos') ? 2 : 0; tapsLeft = 4;
                document.getElementById('starr-overlay').style.display = 'flex';
                renderDropState();
            };

            window.renderDropState = function() {
                const sphere = document.getElementById('starr-sphere-node');
                const title = document.getElementById('starr-title-text');
                const taps = document.getElementById('starr-taps-text');
                const activeColor = dropTiers[currentTier].color;
                sphere.style.setProperty('--drop-color', activeColor);
                title.innerText = (activeDropType === 'chaos' ? "ХАОС " : "") + dropTiers[currentTier].name;
                title.style.color = activeColor;
                taps.innerText = tapsLeft > 0 ? `Тапай Дроп! Осталось: ${tapsLeft}` : "ОТКРЫТЬ НАГРАДУ";
            };

            window.handleDropTap = function() {
                if (tapsLeft > 0) {
                    tapsLeft--;
                    if (Math.random() < dropTiers[currentTier].upChance) currentTier++;
                    renderDropState();
                } else {
                    triggerLootAward();
                }
            };

            window.triggerLootAward = function() {
                document.getElementById('starr-overlay').style.display = 'none';
                const screen = document.getElementById('reward-screen-node');
                const box = document.getElementById('reward-box-border');
                const img = document.getElementById('reward-img');
                const label = document.getElementById('reward-title-text');
                box.style.setProperty('--drop-color', dropTiers[currentTier].color);
                screen.style.display = 'flex';

                let lootMultiplier = (activeDropType === 'chaos') ? 3 : 1;
                let brawlerChance = (activeDropType === 'chaos') ? 0.12 : 0.04;

                if (Math.random() < brawlerChance) {
                    let b = poolBrawlers[Math.floor(Math.random() * poolBrawlers.length)];
                    img.src = `https://wsrv.nl/?url=cdn.brawlify.com/brawler/${b.img}.png`;
                    label.innerHTML = `✨ ${b.name} ✨`;
                    if (!unlockedList.includes(b.id)) unlockedList.push(b.id);
                    alert("Выпал: " + b.name);
                } else {
                    let r = Math.random();
                    if (r < 0.45) { coins += (Math.floor(Math.random()*151)+50)*lootMultiplier; label.innerText = "Монеты"; }
                    else if (r < 0.85) { powerPoints += (Math.floor(Math.random()*81)+20)*lootMultiplier; label.innerText = "Очки силы"; }
                    else { gems += (Math.floor(Math.random()*21)+5)*lootMultiplier; label.innerText = "Гемы"; }
                }
                updateHUD();
            };

            window.closeRewardScreen = function() { document.getElementById('reward-screen-node').style.display = 'none'; };
            window.openBrawlersScreen = function() { document.getElementById('brawlers-screen').style.display = 'flex'; renderBrawlersGrid(); };
            window.closeBrawlersScreen = function() { document.getElementById('brawlers-screen').style.display = 'none'; };
            window.renderBrawlersGrid = function() {
                const grid = document.getElementById('brawlers-grid');
                const counter = document.getElementById('brawlers-counter');
                grid.innerHTML = "";
                counter.innerText = `${unlockedList.length} из 104 БОЙЦОВ`;
                poolBrawlers.forEach(b => {
                    const unlocked = unlockedList.includes(b.id);
                    grid.innerHTML += `<div class="brawler-card-item ${b.rarity} ${unlocked ? '' : 'locked'}">
                        <div class="card-img-wrap"><img src="https://wsrv.nl/?url=cdn.brawlify.com/brawler/${b.img}.png" class="card-img"></div>
                        <div class="card-name-text">${b.name}</div>
                    </div>`;
                });
            };
            updateHUD();
        });
    </script>
</body>
</html>
