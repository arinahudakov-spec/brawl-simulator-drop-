<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars Modern HUD</title>
    <style>
        /* Подключаем оригинальный округлый шрифт */
        @import url('https://fonts.googleapis.com/css2?family=Lilita+One&display=swap');

        * {
            box-sizing: border-box;
            font-family: 'Lilita One', sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Адаптивный игровой контейнер, который держит пропорции экрана бравла */
        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 100vh; /* Идеально для симуляции landscape на вертикальных экранах */
            max-height: 56.25vw; /* Пропорции 16:9 */
            background: radial-gradient(circle at 50% 50%, #54bb3d 0%, #174e10 100%);
            border: 4px solid #111;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* Задний полупрозрачный паттерн (имитация значков бравла на фоне) */
        .game-wrapper::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.3;
            pointer-events: none;
        }

        /* Общие стили для бравл-плашек */
        .brawl-panel {
            background: rgba(18, 14, 37, 0.85);
            border: 2px solid #000;
            border-radius: 6px;
            padding: 4px 8px;
            display: flex;
            align-items: center;
            transform: skewX(-12deg); /* Фирменный косой наклон */
            box-shadow: 0 3px 0 rgba(0,0,0,0.4);
        }
        
        .brawl-panel-inside {
            transform: skewX(12deg); /* Возвращаем текст в ровное положение */
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            text-shadow: 2px 2px 0 #000;
            color: #fff;
        }

        /* ---------------- [ВЕРХНЯЯ ПАНЕЛЬ (HUD)] ---------------- */
        
        /* Профиль игрока (Слева) */
        .hud-profile {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            gap: 6px;
            z-index: 10;
        }
        .profile-avatar {
            width: 35px;
            height: 35px;
            background: #3b225c;
            border: 2px solid #000;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transform: skewX(-12deg);
        }
        .profile-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .player-name {
            font-size: 11px;
            color: #fff;
            text-shadow: 1px 1px 0 #000;
        }

        /* Капсула Валюты (Справа) */
        .hud-resources {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #000;
            border-radius: 20px;
            padding: 2px 10px;
            gap: 12px;
            z-index: 10;
        }
        .resource-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            text-shadow: 1.5px 1.5px 0 #000;
        }
        .res-pp { color: #ff52ba; }
        .res-coins { color: #ffce20; }
        .res-gems { color: #4eff7c; }

        .btn-menu {
            background: #2e374d;
            border: 2px solid #000;
            border-radius: 6px;
            color: white;
            padding: 3px 8px;
            font-size: 14px;
            cursor: pointer;
        }

        /* ---------------- [БОКОВЫЕ СЕНДВИЧ-КНОПКИ] ---------------- */
        
        .hud-left-sidebar {
            position: absolute;
            left: 10px;
            top: 35%;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 10;
        }
        
        .hud-right-sidebar {
            position: absolute;
            right: 10px;
            top: 35%;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 10;
        }

        .side-btn {
            background: linear-gradient(180deg, #5c6bc0 0%, #3f51b5 100%);
            border: 2px solid #000;
            border-radius: 6px;
            width: 55px;
            height: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transform: skewX(-12deg);
            box-shadow: 0 3px 0 #1a237e;
        }
        .side-btn:active { transform: skewX(-12deg) translateY(2px); box-shadow: none; }
        .side-btn span {
            transform: skewX(12deg);
            font-size: 9px;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 1px 1px 0 #000;
        }

        /* ---------------- [ЦЕНТР: БОЕЦ И СЦЕНА] ---------------- */
        
        .center-stage {
            position: absolute;
            bottom: 18%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
        }
        
        /* Круглый подиум под ногами */
        .character-podium {
            width: 140px;
            height: 25px;
            background: radial-gradient(rgba(0, 0, 0, 0.6) 0%, transparent 70%);
            border-radius: 50%;
            margin-top: -10px;
        }

        .brawler-graphic {
            font-size: 80px; /* Уменьшили масштаб */
            animation: idle-bounce 1.5s ease-in-out infinite alternate;
        }

        /* Индикатор ранга над головой */
        .brawler-tag {
            background: #7b1fa2;
            padding: 1px 10px;
            border-radius: 10px;
            font-size: 10px;
            border: 1.5px solid #000;
            margin-bottom: 5px;
            text-shadow: 1px 1px 0 #000;
        }

        @keyframes idle-bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-5px); }
        }

        /* ---------------- [НИЖНИЙ ИНТЕРФЕЙС] ---------------- */
        
        .hud-bottom-bar {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 10;
        }

        /* Brawl Pass (Слева внизу) */
        .brawl-pass-container {
            width: 110px;
            height: 45px;
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
            border: 2px solid #000;
            border-radius: 6px;
            transform: skewX(-12deg);
            box-shadow: 0 3px 0 #b75100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Кнопка ИГРАТЬ и выбор режима (Справа внизу) */
        .battle-section {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 60%;
            justify-content: flex-end;
        }

        .event-slot {
            background: linear-gradient(180deg, #d35400 0%, #a04000 100%);
            border: 2px solid #000;
            border-radius: 6px;
            flex-grow: 1;
            height: 45px;
            transform: skewX(-12deg);
            box-shadow: 0 3px 0 #6e2c00;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-play {
            background: linear-gradient(180deg, #fff176 0%, #fbc02d 100%);
            border: 2px solid #000;
            border-radius: 8px;
            width: 110px;
            height: 50px;
            cursor: pointer;
            transform: skewX(-12deg);
            box-shadow: 0 4px 0 #f57f17;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-play:active {
            transform: skewX(-12deg) translateY(4px);
            box-shadow: none;
        }
        .btn-play span {
            color: #000;
            font-size: 20px;
            transform: skewX(12deg);
            -webkit-text-stroke: 0.5px #fff;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">

        <!-- ВЕРХ СЛЕВА: ПРОФИЛЬ -->
        <div class="hud-profile">
            <div class="profile-avatar">🤖</div>
            <div class="profile-info">
                <div class="player-name">АРИНА</div>
                <div class="brawl-panel" style="padding: 1px 4px;"><div class="brawl-panel-inside">58426 🏆</div></div>
            </div>
        </div>

        <!-- ВЕРХ СПРАВА: ЕДИНАЯ КАПСУЛА ВАЛЮТЫ -->
        <div class="hud-resources">
            <div class="resource-item res-pp">🧬 7827</div>
            <div class="resource-item res-coins">🪙 10797</div>
            <div class="resource-item res-gems">💎 454</div>
            <button class="btn-menu">☰</button>
        </div>

        <!-- ЛЕВЫЙ САЙДБАР -->
        <div class="hud-left-sidebar">
            <div class="side-btn" style="background: linear-gradient(to bottom, #ffeb3b, #ff9800); box-shadow: 0 3px 0 #e65100;"><span>Магазин</span></div>
            <div class="side-btn"><span>Бойцы</span></div>
        </div>

        <!-- СЛЕДУЮЩИЙ ШАГ: ЦЕНТР (БОЕЦ) -->
        <div class="center-stage">
            <div class="brawler-tag">ПОМИДОР 👑</div>
            <div class="brawler-graphic">🟢</div> <!-- Временный Гром -->
            <div class="character-podium"></div>
        </div>

        <!-- ПРАВЫЙ САЙДБАР -->
        <div class="hud-right-sidebar">
            <div class="side-btn"><span>Новости</span></div>
            <div class="side-btn"><span>Друзья</span></div>
            <div class="side-btn"><span>Клуб</span></div>
        </div>

        <!-- НИЖНЯЯ ПАНЕЛЬ -->
        <div class="hud-bottom-bar">
            <!-- Бравл Пасс -->
            <div class="brawl-pass-container">
                <span style="transform: skewX(12deg); font-size: 11px; text-shadow: 1px 1px 0 #000;">BRAWL PASS</span>
            </div>
            
            <!-- Выбор Режима + Кнопка ИГРАТЬ -->
            <div class="battle-section">
                <div class="event-slot">
                    <span style="transform: skewX(12deg); font-size: 11px; text-shadow: 1px 1px 0 #000;">НОКАУТ 5 НА 5</span>
                </div>
                <button class="btn-play">
                    <span>ИГРАТЬ</span>
                </button>
            </div>
        </div>

    </div>

</body>
</html>
