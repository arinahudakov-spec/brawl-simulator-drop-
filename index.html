<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars Modern Simulator</title>
    <style>
        /* Подключаем оригинальный бравл-шрифт */
        @import url('https://fonts.googleapis.com/css2?family=Lilita+One&display=swap');

        * {
            box-sizing: border-box;
            font-family: 'Lilita One', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #050a12;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Адаптивный контейнер под экран телефона (16:9) */
        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 177.78vh; /* Ограничение 16:9 */
            max-height: 56.25vw;
            background: radial-gradient(circle at 50% 50%, #46aa34 0%, #13420c 100%);
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        /* Полупрозрачный фоновый паттерн из черепков/звёзд */
        .bg-pattern {
            position: absolute;
            width: 100%; height: 100%;
            opacity: 0.06;
            background-image: url('https://wsrv.nl/?url=cdn.brawlify.com/gamemode/Showdown.png');
            background-size: 80px;
            pointer-events: none;
        }

        /* ---------------- [HUD: ВЕРХНЯЯ ПАНЕЛЬ] ---------------- */
        
        /* Профиль (Слева) */
        .hud-profile {
            position: absolute; top: 12px; left: 15px;
            display: flex; gap: 8px; z-index: 10;
            align-items: center;
        }
        .avatar-box {
            width: 42px; height: 42px;
            background: #2a1b4e;
            border: 3px solid #000;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            transform: skewX(-10deg);
            box-shadow: 0 3px 0 rgba(0,0,0,0.3);
        }
        .avatar-img { width: 90%; height: 90%; object-fit: contain; transform: skewX(10deg); }
        
        .profile-text { display: flex; flex-direction: column; gap: 1px; }
        .username { font-size: 14px; color: #fff; text-shadow: 2px 2px 0 #000; letter-spacing: 0.5px; }
        
        .trophies-badge {
            background: linear-gradient(180deg, #ff9800 0%, #e65100 100%);
            border: 2px solid #000; border-radius: 6px;
            padding: 1px 8px; font-size: 11px;
            color: #fff; text-shadow: 1.5px 1.5px 0 #000;
            transform: skewX(-10deg);
            display: flex; align-items: center; gap: 3px;
        }

        /* Единая Капсула Ресурсов (Справа) */
        .hud-resources {
            position: absolute; top: 12px; right: 15px;
            display: flex; align-items: center;
            background: rgba(0, 0, 0, 0.65);
            border: 2.5px solid #000;
            border-radius: 20px;
            padding: 3px 12px; gap: 16px; z-index: 10;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.5);
        }
        .res-item {
            display: flex; align-items: center; gap: 5px;
            font-size: 14px; text-shadow: 2px 2px 0 #000;
        }
        .res-pp { color: #ff52ba; }
        .res-coins { color: #ffce20; }
        .res-gems { color: #4eff7c; }
        
        .btn-burger {
            background: #2e374d; border: 2px solid #000; border-radius: 5px;
            color: #fff; font-size: 12px; padding: 2px 6px; cursor: pointer;
        }

        /* ---------------- [HUD: БОКОВЫЕ САЙДБАРЫ] ---------------- */
        
        .sidebar-left { position: absolute; left: 15px; top: 24%; display: flex; flex-direction: column; gap: 8px; z-index: 10; }
        .sidebar-right { position: absolute; right: 15px; top: 32%; display: flex; flex-direction: column; gap: 8px; z-index: 10; }
        
        .side-btn {
            width: 65px; height: 44px;
            border: 2.5px solid #000; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transform: skewX(-10deg);
            box-shadow: 0 4px 0 #1a237e;
            transition: transform 0.05s;
        }
